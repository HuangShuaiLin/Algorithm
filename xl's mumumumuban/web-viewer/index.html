    code: '#include <bits/stdc++.h>\nusing namespace std;\n\n/**\n * 区间DP模板\n * 适用于：石子合并、矩阵链乘、回文分割等\n * 时间复杂度: O(n³) (标准)，部分问题可优化到 O(n²)\n */\n\n// 经典: 合并石子 (区间求和最小值)\nint stoneMerge(const vector<int>& stones) {\n    int n = stones.size();\n    vector<int> pre(n + 1, 0);\n    for (int i = 1; i <= n; i++)\n        pre[i] = pre[i - 1] + stones[i - 1];\n\n    auto sum = [&](int l, int r) {\n        return pre[r + 1] - pre[l];\n    };\n\n    const int INF = 1e9;\n    vector<vector<int>> dp(n, vector<int>(n, INF));\n\n    for (int i = 0; i < n; i++) dp[i][i] = 0;\n\n    for (int len = 2; len <= n; len++) {\n        for (int l = 0; l + len - 1 < n; l++) {\n            int r = l + len - 1;\n            for (int k = l; k < r; k++) {\n                dp[l][r] = min(dp[l][r],\n                    dp[l][k] + dp[k + 1][r] + sum(l, r));\n            }\n        }\n    }\n    return dp[0][n - 1];\n}\n\n// 环形石子合并 (破环成链)\nint stoneMergeCircle(const vector<int>& stones) {\n    int n = stones.size();\n    vector<int> a = stones;\n    a.insert(a.end(), stones.begin(), stones.end());\n\n    vector<int> pre(2 * n + 1, 0);\n    for (int i = 1; i <= 2 * n; i++)\n        pre[i] = pre[i - 1] + a[i - 1];\n\n    auto sum = [&](int l, int r) {\n        return pre[r + 1] - pre[l];\n    };\n\n    const int INF = 1e9;\n    vector<vector<int>> dp(2 * n, vector<int>(2 * n, INF));\n\n    for (int i = 0; i < 2 * n; i++) dp[i][i] = 0;\n\n    for (int len = 2; len <= n; len++) {\n        for (int l = 0; l + len - 1 < 2 * n; l++) {\n            int r = l + len - 1;\n            for (int k = l; k < r; k++) {\n                dp[l][r] = min(dp[l][r],\n                    dp[l][k] + dp[k + 1][r] + sum(l, r));\n            }\n        }\n    }\n\n    int ans = INF;\n    for (int i = 0; i < n; i++)\n        ans = min(ans, dp[i][i + n - 1]);\n    return ans;\n}\n\n// 回文串分割最少次数\nint palindromePartition(const string& s) {\n    int n = s.size();\n    vector<vector<bool>> isPal(n, vector<bool>(n, false));\n    for (int i = n - 1; i >= 0; i--) {\n        for (int j = i; j < n; j++) {\n            if (s[i] == s[j] && (j - i <= 1 || isPal[i + 1][j - 1]))\n                isPal[i][j] = true;\n        }\n    }\n\n    const int INF = 1e9;\n    vector<vector<int>> dp(n, vector<int>(n, INF));\n    for (int i = 0; i < n; i++) dp[i][i] = 0;\n\n    for (int len = 2; len <= n; len++) {\n        for (int l = 0; l + len - 1 < n; l++) {\n            int r = l + len - 1;\n            if (isPal[l][r]) {\n                dp[l][r] = 0;\n            } else {\n                for (int k = l; k < r; k++) {\n                    dp[l][r] = min(dp[l][r],\n                        dp[l][k] + dp[k + 1][r] + 1);\n                }\n            }\n        }\n    }\n    return dp[0][n - 1];\n}\n\n// 最长回文子序列\nint longestPalindromeSubseq(const string& s) {\n    int n = s.size();\n    vector<vector<int>> dp(n, vector<int>(n, 0));\n    for (int i = 0; i < n; i++) dp[i][i] = 1;\n\n    for (int len = 2; len <= n; len++) {\n        for (int l = 0; l + len - 1 < n; l++) {\n            int r = l + len - 1;\n            if (s[l] == s[r])\n                dp[l][r] = dp[l + 1][r - 1] + 2;\n            else\n                dp[l][r] = max(dp[l + 1][r], dp[l][r - 1]);\n        }\n    }\n    return dp[0][n - 1];\n}'

    code: '#include <bits/stdc++.h>\nusing namespace std;\n\n/**\n * 常用排序算法\n * 包含：归并排序(求逆序对)、快速排序、堆排序\n */\n\n// 归并排序 + 求逆序对\nlong long mergeSort(vector<int>& a, int l, int r) {\n    if (l >= r) return 0;\n    int mid = (l + r) / 2;\n    long long inv = mergeSort(a, l, mid) + mergeSort(a, mid + 1, r);\n    vector<int> tmp(r - l + 1);\n    int i = l, j = mid + 1, k = 0;\n    while (i <= mid && j <= r) {\n        if (a[i] <= a[j]) {\n            tmp[k++] = a[i++];\n        } else {\n            tmp[k++] = a[j++];\n            inv += mid - i + 1;\n        }\n    }\n    while (i <= mid) tmp[k++] = a[i++];\n    while (j <= r) tmp[k++] = a[j++];\n    for (int i = 0; i < k; i++)\n        a[l + i] = tmp[i];\n    return inv;\n}\n\nlong long countInversions(vector<int> a) {\n    return mergeSort(a, 0, a.size() - 1);\n}\n\n// 快速选择 (第 k 小的数, k 从 0 开始)\nint quickSelect(vector<int>& a, int l, int r, int k) {\n    if (l >= r) return a[l];\n    int pivot = a[(l + r) / 2];\n    int i = l, j = r;\n    while (i <= j) {\n        while (a[i] < pivot) i++;\n        while (a[j] > pivot) j--;\n        if (i <= j) swap(a[i++], a[j--]);\n    }\n    if (k <= j) return quickSelect(a, l, j, k);\n    if (k >= i) return quickSelect(a, i, r, k);\n    return a[k];\n}\n\n// 离散化\nvector<int> discretize(const vector<int>& a) {\n    vector<int> b = a;\n    sort(b.begin(), b.end());\n    b.erase(unique(b.begin(), b.end()), b.end());\n    vector<int> res(a.size());\n    for (size_t i = 0; i < a.size(); i++)\n        res[i] = lower_bound(b.begin(), b.end(), a[i]) - b.begin();\n    return res;\n}'

    code: '#include <bits/stdc++.h>\nusing namespace std;\n\n/**\n * 树的基础算法\n * 包含：树的直径、树的重心、树的重链剖分\n */\n\n// 树的直径 (两次DFS)\npair<int, int> treeDiameterDFS(const vector<vector<int>>& adj, int start) {\n    int n = adj.size();\n    vector<int> dist(n);\n    function<void(int, int, int)> dfs = [&](int u, int fa, int d) {\n        dist[u] = d;\n        for (int v : adj[u])\n            if (v != fa) dfs(v, u, d + 1);\n    };\n    dfs(start, -1, 0);\n    int u = max_element(dist.begin(), dist.end()) - dist.begin();\n    dfs(u, -1, 0);\n    int v = max_element(dist.begin(), dist.end()) - dist.begin();\n    return {u, v};\n}\n\n// 树的直径 (树形DP, 支持负权)\nint treeDiameterDP(const vector<vector<pair<int, int>>>& adj) {\n    int ans = 0;\n    function<int(int, int)> dfs = [&](int u, int fa) {\n        int d1 = 0, d2 = 0;\n        for (auto [v, w] : adj[u]) {\n            if (v == fa) continue;\n            int d = dfs(v, u) + w;\n            if (d > d1) { d2 = d1; d1 = d; }\n            else if (d > d2) d2 = d;\n        }\n        ans = max(ans, d1 + d2);\n        return d1;\n    };\n    dfs(1, 0);\n    return ans;\n}\n\n// 树的重心\nint treeCentroid(const vector<vector<int>>& adj) {\n    int n = adj.size() - 1;\n    int centroid = -1, minMax = n;\n    vector<int> sz(n + 1);\n    function<void(int, int)> dfs = [&](int u, int fa) {\n        sz[u] = 1;\n        int maxSub = 0;\n        for (int v : adj[u]) {\n            if (v == fa) continue;\n            dfs(v, u);\n            sz[u] += sz[v];\n            maxSub = max(maxSub, sz[v]);\n        }\n        maxSub = max(maxSub, n - sz[u]);\n        if (maxSub < minMax) {\n            minMax = maxSub;\n            centroid = u;\n        }\n    };\n    dfs(1, 0);\n    return centroid;\n}\n\n// 树链剖分 (Heavy-Light Decomposition)\nstruct HLD {\n    int n, timer = 0;\n    vector<vector<int>> adj;\n    vector<int> fa, dep, sz, son;\n    vector<int> top, dfn, rnk;\n\n    HLD(int _n) : n(_n), adj(n + 1),\n        fa(n + 1), dep(n + 1), sz(n + 1), son(n + 1, 0),\n        top(n + 1), dfn(n + 1), rnk(n + 1) {}\n\n    void addEdge(int u, int v) {\n        adj[u].push_back(v);\n        adj[v].push_back(u);\n    }\n\n    void dfs1(int u, int f) {\n        fa[u] = f; dep[u] = dep[f] + 1;\n        sz[u] = 1;\n        for (int v : adj[u]) {\n            if (v == f) continue;\n            dfs1(v, u);\n            sz[u] += sz[v];\n            if (sz[v] > sz[son[u]]) son[u] = v;\n        }\n    }\n\n    void dfs2(int u, int tp) {\n        top[u] = tp;\n        dfn[u] = ++timer;\n        rnk[timer] = u;\n        if (son[u]) dfs2(son[u], tp);\n        for (int v : adj[u]) {\n            if (v == fa[u] || v == son[u]) continue;\n            dfs2(v, v);\n        }\n    }\n\n    void build(int root = 1) {\n        dfs1(root, 0);\n        dfs2(root, root);\n    }\n\n    void pathProcess(int u, int v, function<void(int, int)> op) {\n        while (top[u] != top[v]) {\n            if (dep[top[u]] < dep[top[v]]) swap(u, v);\n            op(dfn[top[u]], dfn[u]);\n            u = fa[top[u]];\n        }\n        if (dep[u] > dep[v]) swap(u, v);\n        op(dfn[u], dfn[v]);\n    }\n\n    void subtreeProcess(int u, function<void(int, int)> op) {\n        op(dfn[u], dfn[u] + sz[u] - 1);\n    }\n\n    int lca(int u, int v) {\n        while (top[u] != top[v]) {\n            if (dep[top[u]] < dep[top[v]]) swap(u, v);\n            u = fa[top[u]];\n        }\n        return dep[u] < dep[v] ? u : v;\n    }\n};'

    code: '#include <bits/stdc++.h>\nusing namespace std;\n\n/**\n * 经典DP模板合集\n * 包含：01背包、完全背包、多重背包、LCS、LIS、编辑距离\n */\n\n// 01背包\nint knapsack01(const vector<int>& weight, const vector<int>& value, int cap) {\n    vector<int> dp(cap + 1, 0);\n    int n = weight.size();\n    for (int i = 0; i < n; i++)\n        for (int j = cap; j >= weight[i]; j--)\n            dp[j] = max(dp[j], dp[j - weight[i]] + value[i]);\n    return dp[cap];\n}\n\n// 完全背包\nint knapsackComplete(const vector<int>& weight, const vector<int>& value, int cap) {\n    vector<int> dp(cap + 1, 0);\n    int n = weight.size();\n    for (int i = 0; i < n; i++)\n        for (int j = weight[i]; j <= cap; j++)\n            dp[j] = max(dp[j], dp[j - weight[i]] + value[i]);\n    return dp[cap];\n}\n\n// 多重背包 (二进制拆分)\nint knapsackMultiple(vector<int> weight, vector<int> value, vector<int> cnt, int cap) {\n    vector<int> dp(cap + 1, 0);\n    int n = weight.size();\n\n    vector<int> newW, newV;\n    for (int i = 0; i < n; i++) {\n        int c = cnt[i];\n        for (int k = 1; k <= c; k <<= 1) {\n            newW.push_back(weight[i] * k);\n            newV.push_back(value[i] * k);\n            c -= k;\n        }\n        if (c > 0) {\n            newW.push_back(weight[i] * c);\n            newV.push_back(value[i] * c);\n        }\n    }\n\n    for (int i = 0; i < (int)newW.size(); i++)\n        for (int j = cap; j >= newW[i]; j--)\n            dp[j] = max(dp[j], dp[j - newW[i]] + newV[i]);\n    return dp[cap];\n}\n\n// LCS 最长公共子序列\nint lcs(const string& s1, const string& s2) {\n    int n = s1.size(), m = s2.size();\n    vector<vector<int>> dp(n + 1, vector<int>(m + 1, 0));\n    for (int i = 1; i <= n; i++) {\n        for (int j = 1; j <= m; j++) {\n            if (s1[i - 1] == s2[j - 1])\n                dp[i][j] = dp[i - 1][j - 1] + 1;\n            else\n                dp[i][j] = max(dp[i - 1][j], dp[i][j - 1]);\n        }\n    }\n    return dp[n][m];\n}\n\n// 输出LCS字符串\nstring lcsString(const string& s1, const string& s2) {\n    int n = s1.size(), m = s2.size();\n    vector<vector<int>> dp(n + 1, vector<int>(m + 1, 0));\n    for (int i = 1; i <= n; i++)\n        for (int j = 1; j <= m; j++)\n            if (s1[i - 1] == s2[j - 1])\n                dp[i][j] = dp[i - 1][j - 1] + 1;\n            else\n                dp[i][j] = max(dp[i - 1][j], dp[i][j - 1]);\n\n    string res;\n    int i = n, j = m;\n    while (i > 0 && j > 0) {\n        if (s1[i - 1] == s2[j - 1]) {\n            res.push_back(s1[i - 1]);\n            i--; j--;\n        } else if (dp[i - 1][j] > dp[i][j - 1]) {\n            i--;\n        } else {\n            j--;\n        }\n    }\n    reverse(res.begin(), res.end());\n    return res;\n}\n\n// LIS 最长上升子序列 O(n log n)\nint lis(const vector<int>& a) {\n    int n = a.size();\n    vector<int> dp;\n    for (int x : a) {\n        auto it = lower_bound(dp.begin(), dp.end(), x);\n        if (it == dp.end())\n            dp.push_back(x);\n        else\n            *it = x;\n    }\n    return dp.size();\n}\n\n// LIS 回溯构造\nvector<int> lisTrack(const vector<int>& a) {\n    int n = a.size();\n    vector<int> dp, idx, pre(n, -1);\n    for (int i = 0; i < n; i++) {\n        auto it = lower_bound(dp.begin(), dp.end(), a[i]);\n        int pos = it - dp.begin();\n        if (it == dp.end()) {\n            dp.push_back(a[i]);\n            idx.push_back(i);\n        } else {\n            *it = a[i];\n            idx[pos] = i;\n        }\n        if (pos > 0) pre[i] = idx[pos - 1];\n    }\n    vector<int> res;\n    for (int i = idx.back(); i != -1; i = pre[i])\n        res.push_back(a[i]);\n    reverse(res.begin(), res.end());\n    return res;\n}\n\n// 编辑距离 (Levenshtein Distance)\nint editDistance(const string& s1, const string& s2) {\n    int n = s1.size(), m = s2.size();\n    vector<vector<int>> dp(n + 1, vector<int>(m + 1));\n    for (int i = 0; i <= n; i++) dp[i][0] = i;\n    for (int j = 0; j <= m; j++) dp[0][j] = j;\n    for (int i = 1; i <= n; i++) {\n        for (int j = 1; j <= m; j++) {\n            if (s1[i - 1] == s2[j - 1])\n                dp[i][j] = dp[i - 1][j - 1];\n            else\n                dp[i][j] = min({dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]}) + 1;\n        }\n    }\n    return dp[n][m];\n}'

    code: '#include <bits/stdc++.h>\nusing namespace std;\n\n/**\n * 计算几何基础模板\n * 包含：点/向量表示、叉积、点积、方向判断、凸包\n */\n\nconst double EPS = 1e-9;\nconst double PI = acos(-1.0);\n\nint sgn(double x) {\n    if (fabs(x) < EPS) return 0;\n    return x < 0 ? -1 : 1;\n}\n\nstruct Point {\n    double x, y;\n    Point() : x(0), y(0) {}\n    Point(double _x, double _y) : x(_x), y(_y) {}\n\n    Point operator+(const Point& p) const { return Point(x + p.x, y + p.y); }\n    Point operator-(const Point& p) const { return Point(x - p.x, y - p.y); }\n    Point operator*(double k) const { return Point(x * k, y * k); }\n    Point operator/(double k) const { return Point(x / k, y / k); }\n    bool operator<(const Point& p) const {\n        int c = sgn(x - p.x);\n        if (c) return c < 0;\n        return sgn(y - p.y) < 0;\n    }\n    bool operator==(const Point& p) const {\n        return sgn(x - p.x) == 0 && sgn(y - p.y) == 0;\n    }\n\n    double len() const { return sqrt(x * x + y * y); }\n    double len2() const { return x * x + y * y; }\n    double angle() const { return atan2(y, x); }\n\n    Point rotate(double rad) const {\n        return Point(x * cos(rad) - y * sin(rad), x * sin(rad) + y * cos(rad));\n    }\n\n    Point normal() const { return Point(-y, x); }\n};\n\ndouble dot(const Point& a, const Point& b) { return a.x * b.x + a.y * b.y; }\ndouble cross(const Point& a, const Point& b) { return a.x * b.y - a.y * b.x; }\n\n// 判断点是否在线段上\nbool onSegment(const Point& p, const Point& a, const Point& b) {\n    return sgn(cross(p - a, p - b)) == 0 &&\n           sgn(dot(p - a, p - b)) <= 0;\n}\n\n// 两线段是否相交\nbool segmentsIntersect(const Point& a1, const Point& a2,\n                       const Point& b1, const Point& b2) {\n    double c1 = cross(a2 - a1, b1 - a1);\n    double c2 = cross(a2 - a1, b2 - a1);\n    double c3 = cross(b2 - b1, a1 - b1);\n    double c4 = cross(b2 - b1, a2 - b1);\n    return sgn(c1) * sgn(c2) < 0 && sgn(c3) * sgn(c4) < 0;\n}\n\n// 点到线段的最短距离\ndouble pointToSegment(const Point& p, const Point& a, const Point& b) {\n    if (sgn(dot(b - a, p - a)) < 0) return (p - a).len();\n    if (sgn(dot(a - b, p - b)) < 0) return (p - b).len();\n    return fabs(cross(b - a, p - a)) / (b - a).len();\n}\n\n// 两直线交点\nPoint lineIntersection(const Point& p1, const Point& v1,\n                       const Point& p2, const Point& v2) {\n    double t = cross(p2 - p1, v2) / cross(v1, v2);\n    return p1 + v1 * t;\n}\n\n// 凸包 (Andrew算法)\nvector<Point> convexHull(vector<Point> pts) {\n    int n = pts.size();\n    if (n <= 2) return pts;\n    sort(pts.begin(), pts.end());\n    vector<Point> hull(n + 1);\n\n    int k = 0;\n    for (int i = 0; i < n; i++) {\n        while (k >= 2 && sgn(cross(hull[k - 1] - hull[k - 2], pts[i] - hull[k - 2])) <= 0)\n            k--;\n        hull[k++] = pts[i];\n    }\n\n    int t = k + 1;\n    for (int i = n - 2; i >= 0; i--) {\n        while (k >= t && sgn(cross(hull[k - 1] - hull[k - 2], pts[i] - hull[k - 2])) <= 0)\n            k--;\n        hull[k++] = pts[i];\n    }\n\n    hull.resize(k - 1);\n    return hull;\n}\n\n// 凸包周长\ndouble convexHullPerimeter(const vector<Point>& hull) {\n    double res = 0;\n    int m = hull.size();\n    for (int i = 0; i < m; i++)\n        res += (hull[(i + 1) % m] - hull[i]).len();\n    return res;\n}\n\n// 凸包面积 (2倍)\ndouble convexHullArea2(const vector<Point>& hull) {\n    double res = 0;\n    int m = hull.size();\n    for (int i = 0; i < m; i++)\n        res += cross(hull[i], hull[(i + 1) % m]);\n    return fabs(res);\n}\n\n// 多边形面积 (2倍)\ndouble polygonArea2(const vector<Point>& p) {\n    double res = 0;\n    int n = p.size();\n    for (int i = 0; i < n; i++)\n        res += cross(p[i], p[(i + 1) % n]);\n    return fabs(res);\n}\n\n// 点是否在多边形内部 (射线法)\nint pointInPolygon(const Point& p, const vector<Point>& poly) {\n    int n = poly.size(), wn = 0;\n    for (int i = 0; i < n; i++) {\n        if (onSegment(p, poly[i], poly[(i + 1) % n]))\n            return 0;\n        int k = sgn(cross(poly[(i + 1) % n] - poly[i], p - poly[i]));\n        int d1 = sgn(poly[i].y - p.y);\n        int d2 = sgn(poly[(i + 1) % n].y - p.y);\n        if (k > 0 && d1 <= 0 && d2 > 0) wn++;\n        if (k < 0 && d2 <= 0 && d1 > 0) wn--;\n    }\n    return wn ? 1 : -1;\n}\n\n// 最近点对\ndouble closestPair(vector<Point>& pts, int l, int r) {\n    if (r - l <= 3) {\n        double d = 1e18;\n        for (int i = l; i < r; i++)\n            for (int j = i + 1; j < r; j++)\n                d = min(d, (pts[i] - pts[j]).len());\n        return d;\n    }\n    int mid = (l + r) / 2;\n    double midX = pts[mid].x;\n    double d = min(closestPair(pts, l, mid), closestPair(pts, mid, r));\n\n    vector<Point> strip;\n    for (int i = l; i < r; i++)\n        if (fabs(pts[i].x - midX) < d)\n            strip.push_back(pts[i]);\n    sort(strip.begin(), strip.end(), [](const Point& a, const Point& b) {\n        return a.y < b.y;\n    });\n    for (int i = 0; i < (int)strip.size(); i++)\n        for (int j = i + 1; j < (int)strip.size() && strip[j].y - strip[i].y < d; j++)\n            d = min(d, (strip[i] - strip[j]).len());\n    return d;\n}'
  },
  {
    id: '高精度运算', cat: '其他', catTag: 'tag-other',
    title: '高精度运算模板，大整数加减乘除实现',
    file: '高精度运算模板，大整数加减乘除实现.cpp',
    desc: '大整数加减乘除（vector<int> 低位在前实现）',
    meta: ['加法', '减法', '乘法', '除法'],
    code: '#include <bits/stdc++.h>\nusing namespace std;\n\n/**\n * 高精度运算 (大整数)\n * 使用字符串或vector<int>表示，低位在前\n * 支持：加法、减法、乘法、除法(整除高精度/低精度)\n */\n\nvoid trim(vector<int>& a) {\n    while (a.size() > 1 && a.back() == 0)\n        a.pop_back();\n}\n\nvector<int> fromString(const string& s) {\n    vector<int> a;\n    for (int i = s.size() - 1; i >= 0; i--)\n        a.push_back(s[i] - \'0\');\n    return a;\n}\n\nstring toString(const vector<int>& a) {\n    string s;\n    for (int i = a.size() - 1; i >= 0; i--)\n        s.push_back(a[i] + \'0\');\n    return s;\n}\n\nbool lessThan(const vector<int>& a, const vector<int>& b) {\n    if (a.size() != b.size())\n        return a.size() < b.size();\n    for (int i = a.size() - 1; i >= 0; i--)\n        if (a[i] != b[i]) return a[i] < b[i];\n    return false;\n}\n\n// 高精度加法\nvector<int> add(const vector<int>& a, const vector<int>& b) {\n    vector<int> res;\n    int carry = 0;\n    for (size_t i = 0; i < max(a.size(), b.size()) || carry; i++) {\n        if (i < a.size()) carry += a[i];\n        if (i < b.size()) carry += b[i];\n        res.push_back(carry % 10);\n        carry /= 10;\n    }\n    return res;\n}\n\n// 高精度减法 (假设 a >= b)\nvector<int> sub(const vector<int>& a, const vector<int>& b) {\n    vector<int> res;\n    int borrow = 0;\n    for (size_t i = 0; i < a.size(); i++) {\n        int t = a[i] - borrow;\n        if (i < b.size()) t -= b[i];\n        if (t < 0) {\n            t += 10;\n            borrow = 1;\n        } else {\n            borrow = 0;\n        }\n        res.push_back(t);\n    }\n    trim(res);\n    return res;\n}\n\n// 高精度乘法: a * b (高精度乘高精度)\nvector<int> mul(const vector<int>& a, const vector<int>& b) {\n    vector<int> res(a.size() + b.size(), 0);\n    for (size_t i = 0; i < a.size(); i++) {\n        int carry = 0;\n        for (size_t j = 0; j < b.size() || carry; j++) {\n            long long cur = res[i + j] + a[i] * 1LL * (j < b.size() ? b[j] : 0) + carry;\n            res[i + j] = cur % 10;\n            carry = cur / 10;\n        }\n    }\n    trim(res);\n    return res;\n}\n\n// 高精度乘低精度\nvector<int> mulInt(const vector<int>& a, int b) {\n    vector<int> res;\n    int carry = 0;\n    for (size_t i = 0; i < a.size() || carry; i++) {\n        if (i < a.size()) carry += a[i] * b;\n        res.push_back(carry % 10);\n        carry /= 10;\n    }\n    trim(res);\n    return res;\n}\n\n// 高精度除法: a / b (高精度除低精度)\npair<vector<int>, int> divInt(const vector<int>& a, int b) {\n    vector<int> res(a.size());\n    int r = 0;\n    for (int i = a.size() - 1; i >= 0; i--) {\n        r = r * 10 + a[i];\n        res[i] = r / b;\n        r %= b;\n    }\n    trim(res);\n    return {res, r};\n}\n\n// 高精度除法: a / b (高精度除高精度，减法模拟)\nvector<int> div(const vector<int>& a, const vector<int>& b) {\n    vector<int> res, cur;\n    for (int i = a.size() - 1; i >= 0; i--) {\n        cur.insert(cur.begin(), a[i]);\n        trim(cur);\n        int cnt = 0;\n        while (!lessThan(cur, b)) {\n            cur = sub(cur, b);\n            cnt++;\n        }\n        res.insert(res.begin(), cnt);\n    }\n    trim(res);\n    return res;\n}'
  }
];

// ====================================================================
// RENDER LOGIC
// ====================================================================
const nav = document.getElementById('nav');
const main = document.getElementById('main');
const search = document.getElementById('search');

// Group templates by category
const CAT_ORDER = ['数据结构', '图论', '字符串', '数学', '其他'];
const grouped = {};
CAT_ORDER.forEach(c => grouped[c] = TEMPLATES.filter(t => t.cat === c));

// Escape HTML
function esc(str) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
  return str.replace(/[&<>"']/g, c => map[c]);
}

// Build sidebar nav
function buildNav(filter = '') {
  nav.innerHTML = '';
  const q = filter.toLowerCase();
  let hasVisible = false;

  CAT_ORDER.forEach(cat => {
    const items = grouped[cat];
    const visible = items.filter(t => {
      if (!q) return true;
      return t.id.includes(q) || t.title.toLowerCase().includes(q) ||
             t.desc.includes(q) || t.file.includes(q) ||
             t.meta.some(m => m.includes(q));
    });

    if (visible.length === 0) return;
    hasVisible = true;

    const catHead = document.createElement('div');
    catHead.className = 'nav-category';
    catHead.textContent = cat;
    nav.appendChild(catHead);

    visible.forEach((t, idx) => {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.id = t.id;
      item.innerHTML = '<span class="tag ' + t.catTag + '">' + (t.cat === '数据结构' ? 'DS' : t.cat === '图论' ? 'G' : t.cat === '字符串' ? 'S' : t.cat === '数学' ? 'M' : 'O') + '</span>' + t.id;
      item.onclick = () => showTemplate(t.id);
      nav.appendChild(item);
    });
  });

  if (!hasVisible) {
    const no = document.createElement('div');
    no.className = 'no-result';
    no.textContent = '未找到匹配的模板';
    nav.appendChild(no);
  }
}

// Build main content (all template sections)
function buildMain() {
  main.innerHTML = '';
  TEMPLATES.forEach(t => {
    const section = document.createElement('section');
    section.className = 'template-section';
    section.id = 'section-' + t.id;

    section.innerHTML = '\n      <div class="section-header">\n        <h2>' + esc(t.title) + '</h2>\n        <p class="desc">' + esc(t.desc) + '</p>\n        <div class="meta">\n          ' + t.meta.map(m => '<span class="meta-item">' + esc(m) + '</span>').join('') + '\n        </div>\n      </div>\n      <div class="code-wrapper">\n        <div class="code-header">\n          <span>' + esc('📄 ' + t.file) + '</span>\n          <button class="copy-btn" data-id="' + t.id + '">📋 复制</button>\n        </div>\n        <pre><code>' + esc(t.code) + '</code></pre>\n      </div>\n    ';
    main.appendChild(section);
  });

  // Bind copy buttons
  main.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const t = TEMPLATES.find(x => x.id === id);
      navigator.clipboard.writeText(t.code).then(() => {
        btn.textContent = '✓ 已复制';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 复制';
          btn.classList.remove('copied');
        }, 1500);
      }).catch(() => {
        btn.textContent = '✗ 失败';
        setTimeout(() => { btn.textContent = '📋 复制'; }, 1500);
      });
    });
  });
}

let currentTemplate = null;

function showTemplate(id) {
  main.querySelectorAll('.template-section').forEach(s => s.classList.remove('active'));
  const section = document.getElementById('section-' + id);
  if (section) {
    section.classList.add('active');
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const navItem = nav.querySelector('[data-id="' + CSS.escape(id) + '"]');
  if (navItem) navItem.classList.add('active');

  currentTemplate = id;
  history.replaceState(null, '', '#' + id);
}

// ===== Event: search =====
search.addEventListener('input', () => {
  buildNav(search.value);
});

// ===== Init =====
buildMain();
buildNav();

// Handle hash on load
const hash = decodeURIComponent(location.hash.slice(1));
if (hash) {
  const t = TEMPLATES.find(x => x.id === hash);
  if (t) showTemplate(t.id);
  else showTemplate(TEMPLATES[0].id);
} else {
  showTemplate(TEMPLATES[0].id);
}

// Keyboard shortcut: Ctrl+K to focus search
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    search.focus();
  }
});

console.log('🚀 ACM 算法模板库已就绪 · 共 ' + TEMPLATES.length + ' 个模板');
</script>
</body>
</html>
